<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acasa Gold Live</title>
    <style>
        body { background-color: #000 !important; color: #fff !important; font-family: Arial, sans-serif !important; margin: 0 !important; padding: 20px !important; display: flex !important; flex-direction: column !important; align-items: center !important; width: 100% !important; box-sizing: border-box !important; }
        .header { display: flex !important; align-items: center !important; justify-content: center !important; gap: 20px !important; margin-bottom: 20px !important; width: 100% !important; max-width: 800px !important; }
        .logo { width: 80px; background-color: #ffffff; padding: 5px; border-radius: 5px; object-fit: contain; }
        h1 { margin: 0 !important; font-size: 2em !important; }
        .player-container { width: 100% !important; max-width: 800px !important; aspect-ratio: 16 / 9 !important; background: #1a1a1a !important; border: 2px solid #333 !important; margin: 0 auto !important; display: block !important; overflow: hidden !important; }
        iframe { width: 100% !important; height: 100% !important; border: none !important; }
        
        /* Style for the Safari instruction message */
        #safari-hint { margin-top: 20px; color: #aaa; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fcdn-0.tvprofil.com%2Fimg%2Fkanali-logo%2FAcasa_Gold_RO_logo.png&f=1&nofb=1&ipt=22c3b030b1834ddd3b284a3f5735f7c1310d3764861e1be5083fa29965090d6c" alt="Logo Acasa Gold" class="logo">
        <h1>Acasa Gold Live</h1>
    </div>

    <div class="player-container">
        <!-- Added allowfullscreen attribute for player native support -->
        <iframe src="https://canale-tv.net/channel/acasagold.html" allowfullscreen="true" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>

    <!-- Safari instruction message container -->
    <div id="safari-hint"></div>

    <script>
        // Check if the user is on Safari to show instructions
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isSafari) {
            document.getElementById('safari-hint').innerHTML = 
                "For fullscreen on Apple devices: tap the <strong>aA</strong> icon in the address bar and select <strong>Request Desktop Website</strong>.";
        }
    </script>
</body>
</html>
