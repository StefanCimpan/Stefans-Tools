<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Acasa Live</title>
    <style>
        body { background-color: #000 !important; color: #fff !important; font-family: Arial, sans-serif !important; margin: 0 !important; padding: 20px !important; display: flex !important; flex-direction: column !important; align-items: center !important; width: 100% !important; box-sizing: border-box !important; }
        .header { display: flex !important; align-items: center !important; justify-content: center !important; gap: 20px !important; margin-bottom: 20px !important; width: 100% !important; max-width: 800px !important; }
        .logo { width: 80px; background-color: #ffffff; padding: 5px; border-radius: 5px; object-fit: contain; }
        h1 { margin: 0 !important; font-size: 2em !important; }
        .player-container { width: 100% !important; max-width: 800px !important; aspect-ratio: 16 / 9 !important; background: #1a1a1a !important; border: 2px solid #333 !important; margin: 0 auto !important; display: block !important; }
        iframe { width: 100% !important; height: 100% !important; border: none !important; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://external-content.duckduckgo.com/iu/?u=http%3A%2F%2F1.bp.blogspot.com%2F-RhtJuOL0Rs8%2FUZjzF3lxE_I%2FAAAAAAAAITA%2FyGHk4gfoU-M%2Fs1600%2FAcasa%2BTV.png&f=1&nofb=1&ipt=9742badb89d56cb3ecac6fe5bb01f9aa13b24f069e8fb049eebc3cce49d90ca6" alt="Logo Acasa" class="logo">
        <h1>Acasa Live</h1>
    </div>
    <div class="player-container">
        <iframe src="https://canale-tv.net/channel/acasatv.html" allowfullscreen="true" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>

    <!-- Instruction message container -->
    <div id="instruction-hint"></div>

    <script>
        // Check if the user is on an Apple device (iPhone, iPad, Mac)
        const isAppleDevice = /iPad|iPhone|iPod|Macintosh/.test(navigator.userAgent);

        if (isAppleDevice) {
            document.getElementById('instruction-hint').innerHTML = 
                "For fullscreen on Apple devices: tap the <strong>aA</strong> icon in the address bar and select <strong>Request Desktop Website</strong>.";
        }
    </script>
</body>
</html>
