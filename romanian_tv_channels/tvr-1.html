<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>TVR 1 Live</title>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Header styling with flex for logo-title alignment */
        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        
        /* Logo with white background padding */
        .logo { width: 80px; background-color: #ffffff; padding: 5px; border-radius: 5px; object-fit: contain; }
        
        h1 { margin: 0; font-size: 2em; }

        /* Player container */
        .player-container { width: 100%; max-width: 800px; aspect-ratio: 16 / 9; background: #1a1a1a; border: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Schedule section */
        .program-section { margin-top: 30px; width: 100%; max-width: 800px; }
        .program-item { padding: 10px; border-bottom: 1px solid #333; display: flex; gap: 20px; }
        .time { color: #aaa; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://programtv.ro/assets/tvr_1.png" alt="Logo TVR 1" class="logo">
        <h1>TVR 1 Live</h1>
    </div>

    <div class="player-container">
        <iframe src="https://canale-tv.net/channel/tvr1.html" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

</body>
</html>
