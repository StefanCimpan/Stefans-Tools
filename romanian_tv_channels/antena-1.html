<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Antena 1 Live</title>
    <style>
        /* Reset body and center all content vertically and horizontally */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Header container: flex layout for logo and title alignment */
        .header {
            display: flex;
            align-items: center;
            justify-content: center; /* Center horizontally */
            gap: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* Logo styling with white background and padding */
        .logo {
            width: 80px;
            background-color: #ffffff;
            padding: 5px;
            border-radius: 5px;
            object-fit: contain;
        }

        h1 {
            margin: 0;
            font-size: 2em;
        }

        /* Player container: centered using margin auto */
        .player-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 2px solid #333;
            margin: 0 auto; /* Force horizontal centering */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://programtv.ro/assets/antena_1.png" alt="Logo Antena 1" class="logo">
        <h1>Antena 1 Live</h1>
    </div>

    <div class="player-container">
        <!-- Live stream player -->
        <iframe src="https://canale-tv.net/channel/a1.html" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

</body>
</html>
