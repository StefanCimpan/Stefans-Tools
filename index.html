<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stefan's Tools</title>
    <style>
        /* Modern and clean font */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            /* Dynamic padding for mobile responsiveness */
            padding-top: 15vh;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3em;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: 800;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            padding: 0 20px;
        }

        a {
            font-size: 1.2em;
            text-decoration: none;
            color: #ffffff;
            padding: 15px 25px;
            /* Schimbă border-ul sau elimină-l dacă vrei un aspect mai curat */
            border: none; 
            /* Aici adăugăm culoarea Gemini */
            background-color: #1e1f20; 
            border-radius: 12px; /* Opțional: margini rotunjite ca la Gemini */
            width: 80%; 
            max-width: 250px;
            transition: all 0.3s ease;
        }

        /* Hover effect actualizat */
        a:hover {
            /* Poți pune un gri puțin mai deschis la hover pentru contrast */
            background-color: #2c2d2e; 
            color: #ffffff;
        }

        /* Adjustments for larger screens */
        @media (min-width: 768px) {
            h1 { font-size: 4em; }
        }
    </style>
</head>
<body>

    <h1>Stefan's Tools</h1>

    <div class="link-container">
        <a href="romanian_tv_channels/romanian_tv_channels.html">Romanian TV Channels</a>
        <a href="extract_text_from_photo/">Extract text from photo</a>
        <a href="password_generator/">Password Generator</a>
    </div>

</body>
</html>
