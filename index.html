<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stefan's Tools</title>
    <style>
        /* Modern and clean font */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            /* Dynamic padding for mobile responsiveness */
            padding-top: 15vh;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 3em;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: 800;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            padding: 0 20px;
        }

        a {
            font-size: 1.2em;
            text-decoration: none;
            color: #ffffff;
            padding: 15px 25px; /* Increased padding for better touch access on mobile */
            border: 1px solid #ffffff;
            width: 80%; /* Fluid width for mobile */
            max-width: 250px;
            transition: all 0.3s ease;
        }

        /* Hover effect for desktop */
        a:hover {
            background-color: #ffffff;
            color: #000000;
        }

        /* Adjustments for larger screens */
        @media (min-width: 768px) {
            h1 { font-size: 4em; }
        }
    </style>
</head>
<body>

    <h1>Stefan's Tools</h1>

    <div class="link-container">
        <a href="romanian_tv_channels/romanian_tv_channels.html">Romanian TV Channels</a>
        <a href="extract_text_from_photo/">Extract text from photo</a>
    </div>

</body>
</html>
